<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration Directory</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4 sm:p-8 min-h-screen">
    <div class="max-w-5xl mx-auto">
        
        <div class="flex justify-between items-center mb-6">
            <a href="/" class="text-indigo-600 font-bold hover:underline text-sm">← Back to Calendar</a>
            <span class="text-xs bg-slate-200 text-slate-600 px-3 py-1 font-mono rounded font-bold">Admin Panel</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 h-fit">
                <h2 class="text-xl font-black text-slate-900 mb-1">Add Team Member</h2>
                
                <form action="/admin/register" method="POST" class="space-y-4 mt-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Full Name</label>
                        <input type="text" name="name" required placeholder="Jane Smith, RN" class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">3 Initials</label>
                        <input type="text" name="initials" required maxlength="3" placeholder="JSM" style="text-transform: uppercase;" class="w-full px-3 py-2 text-center font-mono font-bold tracking-widest rounded-xl border border-slate-300 text-base uppercase focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Staff Job Title</label>
                        <select name="title" class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="Nurse">Nurse (RN/LPN)</option>
                            <option value="Unit Clerk">Unit Clerk</option>
                            <option value="Nurse Tech">Nurse Tech (CNA/PCT)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Security Clearance Role</label>
                        <select name="role" class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="Staff">Staff Workspace Access</option>
                            <option value="Manager">Manager Full Administrative Access</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-xl transition text-sm shadow-sm">Save to Roster</button>
                </form>
            </div>

            <div class="md:grid-cols-1 md:col-span-2 bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                <div class="p-4 bg-slate-50 border-b border-slate-200"><h3 class="font-black text-slate-800">Current Registered Roster</h3></div>
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-slate-100 text-slate-400 text-xs uppercase tracking-wider font-bold border-b border-slate-200">
                            <th class="p-3">User Profile</th>
                            <th class="p-3 text-center">Initials</th>
                            <th class="p-3">Job Title</th>
                            <th class="p-3">Role</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        {% for user in users %}
                        <tr>
                            <td class="p-3 font-semibold text-slate-700">{{ user.name }}</td>
                            <td class="p-3 text-center font-mono font-bold text-indigo-600 text-base">{{ user.initials }}</td>
                            <td class="p-3 font-medium text-slate-600">{{ user.title }}</td>
                            <td class="p-3">
                                {% if user.role == 'Manager' %}
                                    <span class="px-2 py-0.5 text-xs font-bold bg-purple-50 text-purple-700 border border-purple-100 rounded-full">Manager</span>
                                {% else %}
                                    <span class="px-2 py-0.5 text-xs bg-slate-100 text-slate-500 rounded-full">Staff</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
