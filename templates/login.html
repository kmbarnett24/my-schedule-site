<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurse Login Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-slate-900">Portal Sign In</h1>
            <p class="text-sm text-slate-500 mt-1">Enter your 3 initials to view the calendar</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="p-3 mb-4 text-xs font-semibold rounded-lg bg-rose-50 text-rose-800 border border-rose-200 text-center">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 tracking-wider mb-2 text-center">Your 3 Initials</label>
                <input type="text" name="initials" required maxlength="3" placeholder="e.g. ADM" style="text-transform: uppercase;" class="w-full text-center tracking-widest font-mono text-2xl px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 uppercase">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition text-sm shadow-md">
                Access Schedule
            </button>
        </form>
    </div>
</body>
</html>
