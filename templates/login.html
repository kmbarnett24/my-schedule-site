<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Scheduling Gatekeeper</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-600/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-emerald-600/10 rounded-full blur-3xl"></div>

        <div class="text-center mb-6 relative">
            <span class="text-[10px] bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 font-mono tracking-widest uppercase font-black px-3 py-1 rounded-full">Gatekeeper Matrix</span>
            <h1 class="text-2xl font-black text-white mt-3 tracking-tight">Staff Scheduling Portal</h1>
            <p class="text-slate-400 text-xs mt-1">Select your profile track or access management console</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="p-3 mb-4 text-xs font-bold rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-center">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Staff Dropdown Portal Pane -->
        <div id="staffPane">
            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-black text-slate-500 tracking-wider mb-1.5">Select Your Name</label>
                    <select name="user_id" required class="w-full bg-slate-950 border border-slate-800 text-slate-200 rounded-xl px-3 py-2.5 text-xs outline-none focus:border-indigo-500 font-medium transition">
                        <option value="" disabled selected>-- Choose Team Member --</option>
                        
                        <optgroup label="☀️ Day Shift Staff Track">
                            {% for u in day_staff %}
                            <option value="{{ u.id }}">{{ u.name }} ({{ u.initials }}) - {{ u.title }}</option>
                            {% endfor %}
                        </optgroup>

                        <optgroup label="🌙 Night Shift Staff Track">
                            {% for u in night_staff %}
                            <option value="{{ u.id }}">{{ u.name }} ({{ u.initials }}) - {{ u.title }}</option>
                            {% endfor %}
                        </optgroup>
                    </select>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-xl transition text-xs tracking-wide shadow-lg mt-2">Initialize Scheduling Session</button>
            </form>
            
            <div class="mt-6 pt-4 border-t border-slate-800 text-center">
                <button onclick="togglePanes()" class="text-xs text-slate-400 hover:text-white font-semibold transition underline decoration-indigo-500 underline-offset-4">💼 Switch to Manager Dashboard Sign In</button>
            </div>
        </div>

        <!-- Manager Credentials Pane (Hidden by Default) -->
        <div id="managerPane" class="hidden">
            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-black text-slate-500 tracking-wider mb-1.5">Manager Authorization ID</label>
                    <input type="text" name="manager_initials" placeholder="Enter Administrative Initials (e.g. ADM)" required style="text-transform: uppercase;" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-center tracking-widest font-mono font-bold rounded-xl px-3 py-2.5 text-xs uppercase outline-none focus:border-purple-500 transition">
                </div>

                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-2.5 rounded-xl transition text-xs tracking-wide shadow-lg mt-2">Verify Administrative Clearance</button>
            </form>
            
            <div class="mt-6 pt-4 border-t border-slate-800 text-center">
                <button onclick="togglePanes()" class="text-xs text-slate-400 hover:text-white font-semibold transition underline decoration-slate-500 underline-offset-4">← Back to Staff Directory Selection</button>
            </div>
        </div>

    </div>

    <script>
        function togglePanes() {
            document.getElementById('staffPane').classList.toggle('hidden');
            document.getElementById('managerPane').classList.toggle('hidden');
        }
    </script>
</body>
</html>
